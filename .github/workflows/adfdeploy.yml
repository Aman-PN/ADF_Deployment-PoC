name: Deploy ADF Resources

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group'
        required: true
        type: choice
        options:
          - Poc_Development
          - Poc_Stage

      data_factory_name:
        description: 'Azure Data Factory Name'
        required: true
        type: choice
        options:
          - dev-env-adf-1
          - stage-env-adf-1

      linked_services:
        description: 'Linked Services (comma-separated)'
        required: false
        default: ''

      datasets:
        description: 'Datasets (comma-separated)'
        required: false
        default: ''

      pipelines:
        description: 'Pipelines (comma-separated)'
        required: false
        default: ''

      branch:
        description: 'Branch to deploy from'
        required: true
        type: choice
        options:
          - develop
          - stage
          - release

env:
  LINKEDSERVICES_PATH: 'linkedService/'
  DATASETS_PATH: 'dataset/'
  PIPELINES_PATH: 'pipeline/'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-adf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - run: az extension add --name datafactory

      - name: Deploy ADF Resources
        run: |
          deploy_linked_services() {
            IFS=',' read -r -a arr <<< "$1"
            for item in "${arr[@]}"; do
              file="${{ env.LINKEDSERVICES_PATH }}${item}.json"
              echo "Deploying Linked Service: $item"
              az datafactory linked-service create \
                --resource-group ${{ github.event.inputs.resource_group }} \
                --factory-name ${{ github.event.inputs.data_factory_name }} \
                --name "$item" \
                --properties @"$file"
            done
          }

          deploy_datasets() {
            IFS=',' read -r -a arr <<< "$1"
            for item in "${arr[@]}"; do
              file="${{ env.DATASETS_PATH }}${item}.json"
              echo "Deploying Dataset: $item"
              az datafactory dataset create \
                --resource-group ${{ github.event.inputs.resource_group }} \
                --factory-name ${{ github.event.inputs.data_factory_name }} \
                --name "$item" \
                --dataset @"$file"
            done
          }

          deploy_pipelines() {
            IFS=',' read -r -a arr <<< "$1"
            for item in "${arr[@]}"; do
              file="${{ env.PIPELINES_PATH }}${item}.json"
              echo "Deploying Pipeline: $item"
              az datafactory pipeline create \
                --resource-group ${{ github.event.inputs.resource_group }} \
                --factory-name ${{ github.event.inputs.data_factory_name }} \
                --name "$item" \
                --pipeline @"$file"
            done
          }

          # Deploy if inputs are provided
          [ -n "${{ github.event.inputs.linked_services }}" ] && deploy_linked_services "${{ github.event.inputs.linked_services }}"
          [ -n "${{ github.event.inputs.datasets }}" ] && deploy_datasets "${{ github.event.inputs.datasets }}"
          [ -n "${{ github.event.inputs.pipelines }}" ] && deploy_pipelines "${{ github.event.inputs.pipelines }}"

      - run: az logout
