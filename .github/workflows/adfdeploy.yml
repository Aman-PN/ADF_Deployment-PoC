name: Deploy ADF Resources

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group'
        required: true
        type: choice
        options:
          - Poc_Development
          - Poc_Stage

      data_factory_name:
        description: 'Azure Data Factory Name'
        required: true
        type: choice
        options:
          - dev-env-adf-1
          - stage-env-adf-1

      linked_services:
        description: 'Linked Services to deploy (comma-separated, leave empty for full deployment)'
        required: false
        default: ''

      datasets:
        description: 'Datasets to deploy (comma-separated, leave empty for full deployment)'
        required: false
        default: ''

      pipelines:
        description: 'Pipelines to deploy (comma-separated, leave empty for full deployment)'
        required: false
        default: ''

      branch:
        description: 'Branch to deploy from (should contain adf_publish folder)'
        required: true
        type: choice
        options:
          - develop
          - stage
          - release
          - adf_publish

permissions:
  contents: read
  id-token: write

env:
  LINKEDSERVICES_PATH: 'poc_adf/linkedService/'
  DATASETS_PATH: 'poc_adf/dataset/'
  PIPELINES_PATH: 'poc_adf/pipeline/'

jobs:
  deploy-adf:
    runs-on: ubuntu-latest

    steps:
      # Checkout selected branch
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # Login to Azure
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy selected resources or full ARM template
      - name: Deploy ADF Resources
        run: |
          set -e

          RESOURCE_GROUP="${{ github.event.inputs.resource_group }}"
          FACTORY_NAME="${{ github.event.inputs.data_factory_name }}"

          # Deploy selected Linked Services
          if [ "${{ github.event.inputs.linked_services }}" != "" ]; then
            IFS=',' read -r -a arr <<< "${{ github.event.inputs.linked_services }}"
            for item in "${arr[@]}"; do
              file="${LINKEDSERVICES_PATH}${item}.json"
              echo "Deploying Linked Service: $item"
              az deployment group create \
                --resource-group "$RESOURCE_GROUP" \
                --template-file "$file" \
                --parameters factoryName="$FACTORY_NAME"
            done
          fi

          # Deploy selected Datasets
          if [ "${{ github.event.inputs.datasets }}" != "" ]; then
            IFS=',' read -r -a arr <<< "${{ github.event.inputs.datasets }}"
            for item in "${arr[@]}"; do
              file="${DATASETS_PATH}${item}.json"
              echo "Deploying Dataset: $item"
              az deployment group create \
                --resource-group "$RESOURCE_GROUP" \
                --template-file "$file" \
                --parameters factoryName="$FACTORY_NAME"
            done
          fi

          # Deploy selected Pipelines
          if [ "${{ github.event.inputs.pipelines }}" != "" ]; then
            IFS=',' read -r -a arr <<< "${{ github.event.inputs.pipelines }}"
            for item in "${arr[@]}"; do
              file="${PIPELINES_PATH}${item}.json"
              echo "Deploying Pipeline: $item"
              az deployment group create \
                --resource-group "$RESOURCE_GROUP" \
                --template-file "$file" \
                --parameters factoryName="$FACTORY_NAME"
            done
          fi

          # If nothing selected, deploy full ARM template
          if [ "${{ github.event.inputs.linked_services }}" == "" ] && \
             [ "${{ github.event.inputs.datasets }}" == "" ] && \
             [ "${{ github.event.inputs.pipelines }}" == "" ]; then

            TEMPLATE_FILE="dev-env-adf-1/ARMTemplateForFactory.json"
            PARAMETERS_FILE="dev-env-adf-1/ARMTemplateParametersForFactory.json"

            if [ ! -f "$TEMPLATE_FILE" ]; then
              echo "Error: $TEMPLATE_FILE not found. Make sure you published in ADF."
              exit 1
            fi

            echo "Deploying FULL ADF ARM Template to Resource Group: $RESOURCE_GROUP"
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file "$TEMPLATE_FILE" \
              --parameters "@$PARAMETERS_FILE"
          fi

      # Logout Azure
      - name: Logout Azure
        run: az logout
