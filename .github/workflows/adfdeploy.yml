name: Deploy ADF Pipelines
 
on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group'
        required: true
        type: choice
        options:
          - Poc_Development
          - Poc_Stage
 
      data_factory_name: 
        description: 'Azure Data Factory Name'
        required: true
        type: choice
        options:
          - dev-env-adf-1
          - stage-env-adf-1
 
      pipelines: 
        description: 'ADF Pipelines to deploy (comma-separated list)'
        required: true
        default: ''  #Blank for user input
 
      branch:
        description: 'Branch to deploy from'
        required: true
        type: choice
        options:
        - develop
        - stage
        - release
 
      environment:
        description: 'Deployment Environment'
        required: false
        type: choice
        options:
          - prod
          - stage
          - dev
 
env:
  PIPELINES_PATH: 'pipeline/' # Path for pipelines: folder in repository
  
permissions:
  contents: read
  id-token: write

jobs:
  deploy-adf-pipelines:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}
 
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install Azure Data Factory extension
      run: az extension add --name datafactory
 
    - name: Deploy ADF pipelines
      run: |
        
        IFS=',' read -r -a pipeline_array <<< "${{ github.event.inputs.pipelines }}"
        for pipeline in "${pipeline_array[@]}"
        do
          pipeline_file="${{ env.PIPELINES_PATH }}${pipeline}.json"
          echo "Deploying pipeline: $pipeline"
          az datafactory pipeline create \
            --resource-group ${{ github.event.inputs.resource_group }} \
            --factory-name ${{ github.event.inputs.data_factory_name }} \
            --name $pipeline \
            --pipeline @"$pipeline_file"
        done 

    - name: Logout of Azure
      run: az logout
