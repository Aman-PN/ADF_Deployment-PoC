name: Deploy ADF Resources

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group'
        required: true
        type: choice
        options:
          - Poc_Development
          - Poc_Stage

      data_factory_name:
        description: 'Azure Data Factory Name'
        required: true
        type: choice
        options:
          - dev-env-adf-1
          - stage-env-adf-1

      linked_services:
        description: 'Linked Services to deploy (comma-separated)'
        required: false
        default: ''

      datasets:
        description: 'Datasets to deploy (comma-separated)'
        required: false
        default: ''

      pipelines:
        description: 'Pipelines to deploy (comma-separated)'
        required: false
        default: ''

      branch:
        description: 'Branch to deploy from'
        required: true
        type: choice
        options:
          - develop
          - stage
          - release

env:
  LINKEDSERVICES_PATH: 'linkedService/'
  DATASETS_PATH: 'dataset/'
  PIPELINES_PATH: 'pipeline/'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-adf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Linked Services
        if: ${{ github.event.inputs.linked_services != '' }}
        run: |
          IFS=',' read -r -a arr <<< "${{ github.event.inputs.linked_services }}"
          for item in "${arr[@]}"; do
            file="${{ env.LINKEDSERVICES_PATH }}${item}.json"
            echo "Deploying Linked Service: $item"
            az deployment group create \
              --resource-group ${{ github.event.inputs.resource_group }} \
              --template-file "$file" \
              --parameters factoryName=${{ github.event.inputs.data_factory_name }}
          done

      - name: Deploy Datasets
        if: ${{ github.event.inputs.datasets != '' }}
        run: |
          IFS=',' read -r -a arr <<< "${{ github.event.inputs.datasets }}"
          for item in "${arr[@]}"; do
            file="${{ env.DATASETS_PATH }}${item}.json"
            echo "Deploying Dataset: $item"
            az deployment group create \
              --resource-group ${{ github.event.inputs.resource_group }} \
              --template-file "$file" \
              --parameters factoryName=${{ github.event.inputs.data_factory_name }}
          done

      - name: Deploy Pipelines
        if: ${{ github.event.inputs.pipelines != '' }}
        run: |
          IFS=',' read -r -a arr <<< "${{ github.event.inputs.pipelines }}"
          for item in "${arr[@]}"; do
            file="${{ env.PIPELINES_PATH }}${item}.json"
            echo "Deploying Pipeline: $item"
            az deployment group create \
              --resource-group ${{ github.event.inputs.resource_group }} \
              --template-file "$file" \
              --parameters factoryName=${{ github.event.inputs.data_factory_name }}
          done

      - run: az logout
