name: Deploy ADF Resources

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group'
        required: true
        type: choice
        options:
          - Poc_Development
          - Poc_Stage

      data_factory_name:
        description: 'Azure Data Factory Name'
        required: true
        type: choice
        options:
          - dev-env-adf-1
          - stage-env-adf-1

      linked_services:
        description: 'Linked Services (comma-separated)'
        required: false
        default: ''

      datasets:
        description: 'Datasets (comma-separated)'
        required: false
        default: ''

      pipelines:
        description: 'Pipelines (comma-separated)'
        required: false
        default: ''

      branch:
        description: 'Branch to deploy from'
        required: true
        type: choice
        options:
          - develop
          - stage
          - release

env:
  LINKEDSERVICES_PATH: 'linkedService/'
  DATASETS_PATH: 'dataset/'
  PIPELINES_PATH: 'pipeline/'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-adf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - run: az extension add --name datafactory

      - name: Deploy ADF Resources
        run: |
          deploy_items() {
            local type=$1
            local items=$2
            local path=$3
            local cmd=$4

            if [ -n "$items" ]; then
              IFS=',' read -r -a arr <<< "$items"
              for item in "${arr[@]}"; do
                file="${path}${item}.json"
                echo "Deploying $type: $item"
                $cmd "$item" "$file"
              done
            fi
          }

          # Linked Services
          deploy_items "Linked Service" "${{ github.event.inputs.linked_services }}" "${{ env.LINKEDSERVICES_PATH }}" \
            'az datafactory linked-service create --resource-group ${{ github.event.inputs.resource_group }} --factory-name ${{ github.event.inputs.data_factory_name }} --name "$1" --properties @"$2"'

          # Datasets
          deploy_items "Dataset" "${{ github.event.inputs.datasets }}" "${{ env.DATASETS_PATH }}" \
            'az datafactory dataset create --resource-group ${{ github.event.inputs.resource_group }} --factory-name ${{ github.event.inputs.data_factory_name }} --name "$1" --dataset @"$2"'

          # Pipelines
          deploy_items "Pipeline" "${{ github.event.inputs.pipelines }}" "${{ env.PIPELINES_PATH }}" \
            'az datafactory pipeline create --resource-group ${{ github.event.inputs.resource_group }} --factory-name ${{ github.event.inputs.data_factory_name }} --name "$1" --pipeline @"$2"'

      - run: az logout
