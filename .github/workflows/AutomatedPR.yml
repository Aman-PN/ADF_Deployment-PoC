          EXISTING_PR_URL="https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/pulls?state=open&base=${TARGET_BRANCH}&head=${USER_GITHUB}:${SOURCE_BRANCH}"

          EXISTING_PR=$(curl -s -H "Authorization: token $TOKEN_GITHUB" -H "Accept: application/vnd.github+json" "$EXISTING_PR_URL" | jq -r '.[0].html_url')

          if [ "$EXISTING_PR" != "null" ] && [ -n "$EXISTING_PR" ]; then
            echo "🔁 PR already exists → $EXISTING_PR"
            echo "🔄 Updating PR title and body..."

            PR_NUMBER=$(echo "$EXISTING_PR" | awk -F'/' '{print $NF}')

            curl -s -X PATCH \
              -H "Authorization: token $TOKEN_GITHUB" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/pulls/${PR_NUMBER} \
              -d "{\"title\":\"$PR_TITLE\",\"body\":\"$PR_BODY\"}" > /dev/null

            echo "✅ Existing PR updated successfully!"
            echo "🔗 $EXISTING_PR"

