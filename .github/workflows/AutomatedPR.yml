name: Automated PR Workflow

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch for promotion (stage or release)"
        type: choice
        options:
          - 'stage'
          - 'release'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  promote-and-manage-pr:
    name: 🚀 Promote Branch and Manage PR
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USER: ${{ github.actor }}
      REPO_NAME: ${{ github.event.repository.name }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch }}

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configure Git Identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: 🐧 Setup Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl git gh

      - name: 🔍 Determine Source and Feature Branch
        id: vars
        run: |
          if [ "${TARGET_BRANCH}" == "stage" ]; then
            echo "SOURCE_BRANCH=develop" >> $GITHUB_ENV
          elif [ "${TARGET_BRANCH}" == "release" ]; then
            echo "SOURCE_BRANCH=stage" >> $GITHUB_ENV
          else
            echo "❌ Invalid target branch"; exit 1
          fi

          TODAY=$(TZ='Asia/Kolkata' date +'%d_%m_%y_%H_%M')
          FEATURE_BRANCH="feature/${TARGET_BRANCH}-${TODAY}"
          echo "FEATURE_BRANCH=$FEATURE_BRANCH" >> $GITHUB_ENV

      - name: 🔄 Prepare Branches
        run: |
          git fetch origin
          git switch "${SOURCE_BRANCH}"
          git pull origin "${SOURCE_BRANCH}"
          git switch "${TARGET_BRANCH}"
          git pull origin "${TARGET_BRANCH}"
          git checkout -b "${FEATURE_BRANCH}"

      - name: ⚙️ Configure Merge Strategy for Workflows
        run: |
          if [ ! -f .gitattributes ]; then
            touch .gitattributes
          fi
          if ! grep -Fxq ".github/workflows/* merge=ours" .gitattributes; then
            echo ".github/workflows/* merge=ours" >> .gitattributes
            git add .gitattributes
            git commit -m "Configure merge strategy for workflows" || true
          fi
          git config merge.ours.driver true

      # - name: 🔀 Merge ${{ env.SOURCE_BRANCH }} into feature branch (excluding workflows)
      #   id: merge_step
      #   run: |
      #     set +e
      #     echo "Fetching latest changes from origin/${SOURCE_BRANCH}..."
      #     git fetch origin "${SOURCE_BRANCH}"
      #     echo "Squash merging origin/${SOURCE_BRANCH} into ${FEATURE_BRANCH}..."
      #     git merge --squash origin/"${SOURCE_BRANCH}"

      #     MERGE_EXIT_CODE=$?
      #     if [ $MERGE_EXIT_CODE -ne 0 ]; then
      #       echo "❌ Merge conflict detected! Committing conflict markers for manual resolution."
      #       echo "MERGE_CONFLICT=true" >> $GITHUB_ENV
      #       git add .
      #       git commit -am "Conflict detected during squash merge - manual resolution required" || true
      #     else
      #       echo "MERGE_CONFLICT=false" >> $GITHUB_ENV
      #       git commit -m "Added changes from ${SOURCE_BRANCH}"
      #     fi
      #     set -e
      #     git diff --name-only origin/"${TARGET_BRANCH}" HEAD

      - name: 🔀 Merge ${{ env.SOURCE_BRANCH }} into feature branch (squash merge with fallback)
        id: merge_step
        run: |
          set +e
          echo "Fetching latest changes from origin/${SOURCE_BRANCH}..."
          git fetch origin "${SOURCE_BRANCH}"

          echo "Attempting squash merge..."
          git merge --squash origin/"${SOURCE_BRANCH}"
          MERGE_EXIT_CODE=$?

          if [ $MERGE_EXIT_CODE -ne 0 ]; then
            echo "❌ Squash merge failed due to conflicts. Cleaning up and retrying with normal merge using -X theirs..."
            git reset --merge  # Clean up squash merge state
            git merge origin/"${SOURCE_BRANCH}" -X theirs --no-edit  
            echo "Squashing commits after fallback merge..."
            git reset --soft $(git merge-base HEAD origin/${TARGET_BRANCH})
            git commit -m "Promote ${SOURCE_BRANCH} to ${TARGET_BRANCH} (auto-resolved)"

            MERGE_EXIT_CODE=$?
            if [ $MERGE_EXIT_CODE -ne 0 ]; then
              echo "❌ Even fallback merge failed! Manual resolution required."
              echo "MERGE_CONFLICT=true" >> $GITHUB_ENV
              git add .
              git commit -am "Conflict detected during fallback merge - manual resolution required" || true
            else
              echo "✅ Fallback merge succeeded."
              echo "MERGE_CONFLICT=false" >> $GITHUB_ENV
            fi
          else
            echo "✅ Squash merge succeeded."
            echo "MERGE_CONFLICT=false" >> $GITH  UB_ENV
            git commit -m "Added changes from ${SOURCE_BRANCH}"
          fi

          # ✅ Pre-check for changes before committing
          if git diff --cached --quiet; then
            echo "::notice::✅ No changes detected between ${SOURCE_BRANCH} and ${TARGET_BRANCH}. Skipping PR creation."
            echo "NO_CHANGES=true" >> $GITHUB_ENV
            exit 0
          else
            echo "✅ Changes detected. Proceeding with PR creation..."
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: 📤 Push Feature Branch (even if conflicts exist)
        if: env.NO_CHANGES == 'false'
        run: |
          git push origin "${FEATURE_BRANCH}" --force
          
      # - name: 🧰 Authenticate GitHub CLI
      #   run: |
      #     echo "${GITHUB_TOKEN}" | gh auth login --with-token
      #     gh auth status

      # ✅ Always create PR (even if conflicts exist)
      - name: 🪄 Create Pull Request
        if: env.NO_CHANGES == 'false'
        run: |
          PR_TITLE="Promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
          PR_BODY="Automated promotion: ${SOURCE_BRANCH} → ${TARGET_BRANCH}"
          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base "$TARGET_BRANCH" \
            --head "$FEATURE_BRANCH"
          PR_NUMBER=$(gh pr list --head "${FEATURE_BRANCH}" --json number --jq '.[0].number')
          if [ "${MERGE_CONFLICT}" == "true" ]; then
            gh pr edit "$PR_NUMBER" --add-label "merge-conflict"
          else
            gh pr edit "$PR_NUMBER" --add-label "auto-promotion-ready"
          fi

      - name: 🎉 Done
        run: echo "✅ Promotion process completed successfully!"