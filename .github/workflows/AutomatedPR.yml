name: Automated PR Workflow

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch for promotion (stage or release)"
        type: choice
        options:
          - 'stage'
          - 'release'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-and-manage-pr:
    name: 🚀 Promote Branch and Manage PR
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #GITHUB_USER: ${{ github.repository_owner }}
      GITHUB_USER: ${{ github.actor }}
      REPO_NAME: ${{ github.event.repository.name }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch }}

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configure Git Identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: 🐧 Setup Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl git

      - name: 🔍 Determine Source and Feature Branch
        id: vars
        run: |
          if [ "${TARGET_BRANCH}" == "stage" ]; then
            echo "SOURCE_BRANCH=develop" >> $GITHUB_ENV
          elif [ "${TARGET_BRANCH}" == "release" ]; then
            echo "SOURCE_BRANCH=stage" >> $GITHUB_ENV
          else
            echo "❌ Invalid target branch"; exit 1
          fi

          TODAY=$(TZ='Asia/Kolkata' date +'%d_%m_%y_%H_%M')
          FEATURE_BRANCH="feature/${TARGET_BRANCH}-${TODAY}"
          echo "FEATURE_BRANCH=$FEATURE_BRANCH" >> $GITHUB_ENV

      - name: 🔄 Prepare Branches
        run: |
          git fetch origin
          git switch "${SOURCE_BRANCH}"
          git pull origin "${SOURCE_BRANCH}"
          git switch "${TARGET_BRANCH}"
          git pull origin "${TARGET_BRANCH}"
          git checkout -b "${FEATURE_BRANCH}"

      - name: 🔀 Merge $SOURCE_BRANCH into feature branch
        run: |
          set +e
          echo "Merging origin/${SOURCE_BRANCH} into ${FEATURE_BRANCH}..."
          git merge origin/"${SOURCE_BRANCH}" --no-edit
          MERGE_EXIT_CODE=$?
          if [ $MERGE_EXIT_CODE -ne 0 ]; then
            echo "❌ Merge conflict detected! Committing conflict markers for manual resolution."
            git add .
            git commit -am "Conflict detected during merge - manual resolution required" || true
          fi
          set -e

      - name: 📤 Push Feature Branch (even if conflicts exist)
        run: |
          git push origin "${FEATURE_BRANCH}" --force

      - name: 🪄 Create or Update Pull Request
        run: |
          PR_TITLE="Promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
          PR_BODY="Automated promotion: ${SOURCE_BRANCH} → ${TARGET_BRANCH}"

          echo "🔍 Checking for existing open PR..."
          EXISTING_PR_URL="https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/pulls?state=open&base=${TARGET_BRANCH}&head=${GITHUB_USER}:${SOURCE_BRANCH}"
          
          EXISTING_PR=$(curl -s -H "Authorization: token $TOKEN_GITHUB" \
                              -H "Accept: application/vnd.github+json" \
                              "$EXISTING_PR_URL" | jq -r '.[0].html_url')

          if [ "$EXISTING_PR" != "null" ] && [ -n "$EXISTING_PR" ]; then
            echo "🔁 PR already exists → $EXISTING_PR"
          else
            echo "🪄 Creating new Pull Request..."
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base "$TARGET_BRANCH" \
              --head "$FEATURE_BRANCH"
          fi

      - name: 🎉 Done
        run: echo "✅ Promotion process completed successfully!"
