name: Automated_PR_workflow

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch for promotion (stage or release)"
        type: choice
        options:
          - 'stage'
          - 'release'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-or-update-pr:
    name: 🚀 Promote Branch and Manage PR
    runs-on: ubuntu-latest

    env:
      TOKEN_GITHUB: ${{ secrets.GITHUB_TOKEN }}
      USER_GITHUB: ${{ vars.USER_GITHUB }}
      REPO_NAME: ${{ vars.REPO_NAME }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch }}

    steps:
      # Step 1 - Checkout code
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2 - Configure Git
      - name: ⚙️ Configure Git identity
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions Bot"

      # Step 3 - Setup environment
      - name: 🐧 Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl git

      # Step 4 - Determine source and feature branches
      - name: 🔁 Determine branches
        id: vars
        run: |
          if [ "${{ env.TARGET_BRANCH }}" == "stage" ]; then
            echo "SOURCE_BRANCH=develop" >> $GITHUB_ENV
          elif [ "${{ env.TARGET_BRANCH }}" == "release" ]; then
            echo "SOURCE_BRANCH=stage" >> $GITHUB_ENV
          else
            echo "❌ Invalid target branch. Use 'stage' or 'release'."
            exit 1
          fi

          TODAY=$(TZ='Asia/Kolkata' date +'%d_%m_%y_%H_%M')
          FEATURE_BRANCH="feature/${{ env.TARGET_BRANCH }}-${TODAY}"
          echo "FEATURE_BRANCH=$FEATURE_BRANCH" >> $GITHUB_ENV

      # Step 5 - Create feature branch
      - name: 🌿 Create feature branch
        run: |
          git fetch origin
          git switch "${{ env.TARGET_BRANCH }}"
          git pull origin "${{ env.TARGET_BRANCH }}"
          git checkout -b "${{ env.FEATURE_BRANCH }}"

      # Step 6 - Try merge and handle conflicts
      - name: 🔄 Merge source → feature branch
        id: merge
        run: |
          set +e
          git merge origin/${SOURCE_BRANCH} --no-commit --no-ff
          MERGE_STATUS=$?
          if [ $MERGE_STATUS -ne 0 ]; then
            echo "conflict=true" >> $GITHUB_OUTPUT
          else
            echo "conflict=false" >> $GITHUB_OUTPUT
            git commit -m "Merged ${SOURCE_BRANCH} into ${FEATURE_BRANCH}"
            git push origin "${FEATURE_BRANCH}"
          fi
          set -e

      # Step 7 - Handle conflicts
      - name: ⚠️ Handle merge conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          echo "❌ Merge conflict detected! Creating PR for manual resolution..."
          
          PR_TITLE="Resolve Conflicts: ${SOURCE_BRANCH} → ${TARGET_BRANCH}"
          PR_BODY="⚠️ Merge conflicts detected while promoting **${SOURCE_BRANCH} → ${TARGET_BRANCH}**.  
          Please resolve manually in **${FEATURE_BRANCH}** and push the changes.  
          Once resolved, re-run this workflow to continue automation."

          PR_URL=$(curl -s -X POST \
              -H "Authorization: token ${TOKEN_GITHUB}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/pulls \
              -d "{\"title\":\"$PR_TITLE\",\"head\":\"${FEATURE_BRANCH}\",\"base\":\"${TARGET_BRANCH}\",\"body\":\"$PR_BODY\"}" \
              | jq -r '.html_url')

          if [ "$PR_URL" == "null" ] || [ -z "$PR_URL" ]; then
            echo "❌ Failed to create conflict PR. Check permissions."
            exit 1
          fi

          echo "🛑 Workflow paused — manual action required."
          echo "👉 Please resolve merge conflicts and push fixes to continue."
          echo "🔗 PR: $PR_URL"

          # Optional: Add a PR label for visibility
          PR_NUMBER=$(echo "$PR_URL" | awk -F'/' '{print $NF}')
          curl -s -X POST \
            -H "Authorization: token ${TOKEN_GITHUB}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/issues/${PR_NUMBER}/labels \
            -d '{"labels": ["needs-conflict-resolution"]}'

          exit 0  # stops further steps until manually resolved

      # Step 8 - Create or update PR if no conflicts
      - name: 🪄 Create or Update Pull Request
        if: steps.merge.outputs.conflict == 'false'
        run: |
          PR_TITLE="Promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
          PR_BODY="Automated promotion: ${SOURCE_BRANCH} → ${TARGET_BRANCH}"

          echo "🔍 Checking for existing open PR..."
          EXISTING_PR_URL="https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/pulls?state=open&base=${TARGET_BRANCH}&head=${USER_GITHUB}:${SOURCE_BRANCH}"
          
          EXISTING_PR=$(curl -s -H "Authorization: token ${TOKEN_GITHUB}" -H "Accept: application/vnd.github+json" "$EXISTING_PR_URL" | jq -r '.[0].html_url')

          if [ "$EXISTING_PR" != "null" ] && [ -n "$EXISTING_PR" ]; then
            echo "🔁 PR already exists → $EXISTING_PR"
            PR_NUMBER=$(echo "$EXISTING_PR" | awk -F'/' '{print $NF}')
            curl -s -X PATCH \
              -H "Authorization: token ${TOKEN_GITHUB}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/pulls/${PR_NUMBER} \
              -d "{\"title\":\"$PR_TITLE\",\"body\":\"$PR_BODY\"}" > /dev/null
            echo "✅ PR updated successfully!"
          else
            echo "🪄 Creating new Pull Request..."
            PR_URL=$(curl -s -X POST \
                -H "Authorization: token ${TOKEN_GITHUB}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${USER_GITHUB}/${REPO_NAME}/pulls \
                -d "{\"title\":\"$PR_TITLE\",\"head\":\"${FEATURE_BRANCH}\",\"base\":\"${TARGET_BRANCH}\",\"body\":\"$PR_BODY\"}" \
                | jq -r '.html_url')

            if [ "$PR_URL" == "null" ] || [ -z "$PR_URL" ]; then
              echo "❌ Failed to create Pull Request. Check permissions."
              exit 1
            fi
            echo "✅ PR created successfully: $PR_URL"
          fi

      - name: 🎉 Final message
        if: steps.merge.outputs.conflict == 'false'
        run: echo "✅ Promotion process completed successfully!"