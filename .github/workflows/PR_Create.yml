name: Create PR After Conflict Resolution

on:
  push:
    branches:
      - 'feature/stage*'
      - 'feature/release*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr-if-clean:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Check for Label on Existing PR
        run: |
          PR_NUMBER=$(gh pr list --head "${BRANCH_NAME}" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
            if echo "$LABELS" | grep -q "auto-promotion-ready"; then
              echo "LABEL_FOUND=true" >> $GITHUB_ENV
            else
              echo "LABEL_FOUND=false" >> $GITHUB_ENV
            fi
          else
            echo "LABEL_FOUND=false" >> $GITHUB_ENV

      - name: 🪄 Update Pull Request After Conflict Resolution
        if: env.LABEL_FOUND == 'true'
        run: |
          PR_NUMBER=$(gh pr list --head "${BRANCH_NAME}" --json number --jq '.[0].number')
          echo "Updating PR #$PR_NUMBER for ${BRANCH_NAME}..."
          gh pr edit "$PR_NUMBER" --body "Conflicts resolved and branch updated."