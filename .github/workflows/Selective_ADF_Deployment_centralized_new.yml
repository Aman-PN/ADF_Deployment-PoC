name: Selective_ADF_Deployment_centralized_new
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'environment'
        type: choice
        options:
          - 'stage'
          - 'prod'
        required: true
      Pipelines:
        description: 'Enter the pipeline name'
        type: string
      LinkedServices:
        description: 'Enter the linked service name'
        type: string
      Datasets:
        description: 'Enter the dataset name'
        type: string
      Triggers:
        description: 'Enter the trigger name'
        type: string
      Triggers-status:
        description: 'Provide the status of the triggers to be deployed'
        type: choice
        options:
          - 'Started'
          - 'Stopped'
        default: 'Started'
    
permissions:
  contents: read
  id-token: write

jobs:
  Selective_ADF_Deployment: 
    uses: Aman-PN/Centralized-CICD/.github/workflows/adf_selective_v1.yml@main
    with:
      environment: ${{ inputs.environment }}
      team: ${{ inputs.team }}
      Pipelines: ${{ inputs.Pipelines }}
      LinkedServices: ${{ inputs.LinkedServices }}
      Datasets: ${{ inputs.Datasets }}
      Triggers: ${{ inputs.Triggers }}
      Triggers-status: ${{ inputs.Triggers-status }}
    secrets: inherit
