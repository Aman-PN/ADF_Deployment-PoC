name: Main_ADF_full_deployment
on:
  workflow_call:
    inputs:
      environment:
        description: 'environment'
        required: true
        type: string
      Triggers-status:
        description: 'Provide the status of the triggers to be deployed'
        type: string
        default: 'Started'

permissions:
  id-token: write
  contents: read

jobs:

  User-Varification:
    runs-on: ubuntu-latest
    if: (contains(inputs.environment, 'prod') || contains(inputs.environment, 'stage'))
    steps:
      - name: User Varification
        run: |
          echo ${{ vars.AUTHORIZED_USERS_FOR_PROD_DEPLOYMENTS }} >> ProdDeployUsersWhiteList.txt
          if grep '${{ github.actor }}' ProdDeployUsersWhiteList.txt; then
            echo "${{ github.actor }} user is authorized to deploy on Stage & Production environment"
          else
            echo "${{ github.actor }} user is not authorized to deploy on Stage & Production environment"
            exit 1
          fi

  Approval-Request:
    needs: User-Varification
    if: always() && (contains(inputs.environment, 'prod') || contains(inputs.environment, 'stage'))
    runs-on: ubuntu-latest
    steps:
      - name: Approval Request
        run: |
          echo "Approval request sent.."

  full_adf_deployment:
    needs:
      - Approval-Request
      - User-Varification
    if: always() && (needs.User-Varification.result == 'success' || needs.User-Varification.result == 'skipped') && (needs.Approval-Request.result == 'success' || needs.Approval-Request.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      adfbranch: ${{ vars.ADFBRANCH }}
      subscriptionIdVariable: ${{ vars.ARM_SUBSCRIPTION_ID }}
      clientIdVariable: ${{ secrets.ARM_CLIENT_ID }}
      clientSecretVariable: ${{ secrets.ARM_CLIENT_SECRET }}
      tenantIdVariable: ${{ vars.ARM_TENANT_ID }}
      rsg: ${{ vars.RSG }}
      adf: ${{ vars.ADF }}
      arm_folder: ${{ vars.ARM_FOLDER }}

    steps:
      - name: Pipeline run information
        run: |
          echo "This pipeline is triggered by ${{ github.actor }}"
          echo "Selected environment is ${{ inputs.environment }}"
          rm -rf ${{ vars.ARM_FOLDER }}/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Create Python helper scripts
        run: |
          touch params.json

          cat <<'EOT' > replaceparams.py
          import os, sys
          from csv import reader

          def replaceString(fileName, sourceSetting, targetSetting):
              with open(fileName, "rt") as fin:
                  data = fin.read().replace(sourceSetting, targetSetting)
              with open(fileName, "wt") as fout:
                  fout.write(data)

          def getFileNames(directoryName):
              fileList = []
              for (root, dirs, files) in os.walk(directoryName):
                  for f in files:
                      if '.json' in f:
                          fileList.append(os.path.join(root, f))
              return fileList

          def prepareFiles(sourceDirectory, nameValuePairFile):
              with open(nameValuePairFile, 'r') as read_obj:
                  csv_reader = reader(read_obj)
                  list_of_rows = list(csv_reader)
                  list_of_files = getFileNames(sourceDirectory)
                  for fileName in list_of_files:
                      for item in list_of_rows:
                          replaceString(fileName, item[0], item[1])

          if __name__ == '__main__':
              args = sys.argv
              globals()[args[1]](*args[2:])
          EOT

          cat <<'EOT' > adfutility.py
          import json, sys

          def getname(inputfile):
              with open(inputfile, 'r') as gn:
                  data = json.load(gn)
                  print(data["name"])

          def getfile(inputfile, outputfile):
              with open(inputfile, 'r') as ipf:
                  data = json.load(ipf)
                  properties = data["properties"]
                  with open(outputfile, 'w') as opf:
                      json.dump(properties, opf)

          def getparam(paramfile, valuefile, component):
              with open(paramfile, 'r') as pf:
                  data = json.load(pf)
                  with open(valuefile, 'r') as vf:
                      value = json.load(vf)
                      for p, v in value.items():
                          if component == "pipeline":
                              data["properties"]["parameters"][p]["defaultValue"] = v
                          else:
                              data["pipeline"]["parameters"][p] = v
                      with open(paramfile, 'w') as opf:
                          json.dump(data, opf)

          if __name__ == '__main__':
              globals()[sys.argv[1]](*sys.argv[2:])
          EOT

      - name: Replace parameters
        run: |
          echo "${{ vars.PARAMETERIZATION }}" > parameters.txt
          python replaceparams.py prepareFiles ${{ vars.ARM_FOLDER }} parameters.txt

      - name: Azure Login
        run: |
          az login --service-principal -u ${{ secrets.ARM_CLIENT_ID }} -p ${{ secrets.ARM_CLIENT_SECRET }} -t ${{ vars.ARM_TENANT_ID }} --allow-no-subscriptions
          az config set extension.use_dynamic_install=yes_without_prompt

      - name: Get current triggers status
        continue-on-error: true
        run: |
          az datafactory trigger list --factory-name "${{ vars.ADF }}" --resource-group "${{ vars.RSG }}" --query "[?properties.runtimeState=='Started'].name" -o tsv > triggers.txt

      - name: Stop triggers
        continue-on-error: true
        run: |
          for trigger in $(cat triggers.txt); do
            az datafactory trigger stop --factory-name "${{ vars.ADF }}" --resource-group "${{ vars.RSG }}" --name "$trigger"
            echo "Stopped $trigger trigger"
          done

      - name: Linked service deployment (dynamic file handling)
        run: |
          set -x
          for file in $(find ${{ vars.ARM_FOLDER }}/linkedService -name "*.json"); do
            python adfutility.py getname "$file" > ls.txt
            lsname=$(cat ls.txt)
            python adfutility.py getfile "$file" "${{ vars.ARM_FOLDER }}/linkedService/$lsname.json"
            echo "Creating $lsname linked service"
            az datafactory linked-service create --factory-name "$adf" --name "$lsname" --properties "${{ vars.ARM_FOLDER }}/linkedService/$lsname.json" --resource-group "$rsg" --output table
          done

      - name: Dataset deployment (dynamic file handling)
        run: |
          set -x
          for file in $(find ${{ vars.ARM_FOLDER }}/dataset -name "*.json"); do
            python adfutility.py getname "$file" > ds.txt
            dsname=$(cat ds.txt)
            python adfutility.py getfile "$file" "${{ vars.ARM_FOLDER }}/dataset/$dsname.json"
            echo "Creating $dsname dataset"
            az datafactory dataset create --factory-name "$adf" --name "$dsname" --properties "${{ vars.ARM_FOLDER }}/dataset/$dsname.json" --resource-group "$rsg" --output table
          done

      - name: Pipeline deployment (dynamic file handling)
        run: |
          set -x
          for file in $(find ${{ vars.ARM_FOLDER }}/pipeline -name "*.json"); do
            python adfutility.py getname "$file" > pipeline.txt
            pipelinename=$(cat pipeline.txt)
            python adfutility.py getfile "$file" "${{ vars.ARM_FOLDER }}/pipeline/$pipelinename.json"
            echo "Creating $pipelinename pipeline"
            az datafactory pipeline create --factory-name "$adf" --name "$pipelinename" --pipeline "${{ vars.ARM_FOLDER }}/pipeline/$pipelinename.json" --resource-group "$rsg" --output table
          done

      - name: Trigger deployment (dynamic file handling)
        run: |
          set -x
          for file in $(find ${{ vars.ARM_FOLDER }}/trigger -name "*.json"); do
            python adfutility.py getname "$file" > trigger.txt
            triggername=$(cat trigger.txt)
            python adfutility.py getfile "$file" "${{ vars.ARM_FOLDER }}/trigger/${triggername}duprop.json"
            echo "Creating $triggername trigger"
            az datafactory trigger create --factory-name "$adf" --name "$triggername" --properties "${{ vars.ARM_FOLDER }}/trigger/${triggername}duprop.json" --resource-group "$rsg" --output table
          done

      - name: New triggers status
        run: |
          if [ "${{ inputs.Triggers-status }}" == "Started" ]; then
            for file in $(find ${{ vars.ARM_FOLDER }}/trigger -name "*.json"); do
              python adfutility.py getname "$file" > tname.txt
              trigger=$(cat tname.txt)
              if [ $(grep -c "$trigger" triggers.txt) -eq 0 ]; then
                echo "$trigger" >> triggers.txt
              fi
            done
          else
            echo "No new triggers to start"
          fi

      - name: Initiate triggers
        if: always()
        run: |
          for trigger in $(cat triggers.txt); do
            az datafactory trigger start --factory-name "${{ vars.ADF }}" --resource-group "${{ vars.RSG }}" --name "$trigger"
            echo "Started $trigger trigger"
          done

          rm -rf triggers.txt
