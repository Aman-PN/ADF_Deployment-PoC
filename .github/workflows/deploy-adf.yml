name: Deploy ADF (from adf_publish branch)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ADF_NAME: ${{ secrets.ADF_NAME }}

jobs:
  deploy-adf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout adf_publish branch
        uses: actions/checkout@v4
        with:
          ref: adf_publish
          path: adf_publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF ARM template
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            TEMPLATE="adf_publish/ARMTemplateForFactory.json"
            PARAMS="adf_publish/ARMTemplateForFactoryParameters.json"

            az deployment group create \
              --name "adf-deploy-${GITHUB_RUN_ID}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              --template-file "$TEMPLATE" \
              --parameters "@$PARAMS" \
              --parameters factoryName="${{ secrets.ADF_NAME }}"
