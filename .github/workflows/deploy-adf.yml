name: Deploy ADF (from adf_publish branch)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ADF_NAME: ${{ secrets.ADF_NAME }}

jobs:
  deploy-adf:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Switch to adf_publish branch
      - name: Checkout adf_publish branch
        run: |
          git fetch origin adf_publish:adf_publish
          git checkout adf_publish

      # Step 3: Login to Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 4: Install Azure CLI (latest stable, no Docker)
      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az version

      # Step 5: Deploy ADF ARM template
      - name: Deploy ARM template
        run: |
          az account set --subscription $AZURE_SUBSCRIPTION_ID

          TEMPLATE_PATH="ARMTemplateForFactory/ARMTemplateForFactory.json"
          PARAMS_PATH="ARMTemplateForFactory/ARMTemplateForFactory.parameters.json"

          if [ ! -f "$TEMPLATE_PATH" ]; then
            echo "Template not found at $TEMPLATE_PATH"
            ls -R
            exit 1
          fi

          echo "Deploying ADF ARM template..."
          DEPLOYMENT_NAME="adf-deploy-$(date +%s)"   # unique name each run

          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file "$TEMPLATE_PATH" \
            --parameters @"$PARAMS_PATH" \
            --parameters factoryName="$ADF_NAME" \
            --mode Incremental
