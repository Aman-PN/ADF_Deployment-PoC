name: Deploy ADF (from adf_publish branch)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ADF_NAME: ${{ secrets.ADF_NAME }}

jobs:
  deploy-adf:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Switch to adf_publish branch
      - name: Checkout adf_publish branch
        run: |
          git fetch origin adf_publish:adf_publish
          git checkout adf_publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF ARM template
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            TEMPLATE="ad-aw-project-dolly/ARMTemplateForFactory.json"
            PARAMS="ad-aw-project-dolly/ARMTemplateParametersForFactory.json"

            az deployment group create \
              --name "adf-deploy-${GITHUB_RUN_ID}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              --template-file "$TEMPLATE" \
              --parameters "@$PARAMS" \
              --parameters factoryName="${{ secrets.ADF_NAME }}"
